name: Build And Release

permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:
  push:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare
        run: |
          sudo apt update
          sudo apt install -y curl wget python3 python3-venv git rustc cargo
          ./prepare.sh
          cargo install cbindgen --force

      - name: Build
        run: |
          cd firefox
          ../build.sh
          
      - name: install
        run: |
          ./install.sh
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mozjs-linux-x86_64
          path: |
            miniroot/include/
            miniroot/lib/

  docs:
    needs: [linux]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    name: Generate doxygen documentation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: mozjs-linux-x86_64
          path: .
            
      - name: Prepare
        run: |
          sudo apt update
          sudo apt install -y wget python3 git doxygen graphviz

      - name: Build
        run: |
          git clone https://github.com/jothepro/doxygen-awesome-css.git
          ls -l
          doxygen

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: [linux]
    runs-on: ubuntu-latest
    name: Release built binaries
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: Merge Artifacts
        run: |
          sudo apt install -y zip
          for dir in mozjs-*-x86_64; do
            zip -r $dir.zip $dir
          done

      - name: Upload Artifacts
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: mozjs150
          prerelease: false
          files: |
            mozjs-*-x86_64.zip
